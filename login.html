<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OHSSMS Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="forms.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <h1>OHSSMS</h1>
            <p class="subtitle">Online High School Student Management System</p>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="role">Role:</label>
                    <select id="role" name="role" required>
                        <option value="">Select Role</option>
                        <option value="admin">Admin</option>
                        <option value="teacher">Teacher</option>
                        <option value="student">Student</option>
                        <option value="nts">Non-Teaching Staff</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" placeholder="Enter your ID or username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Login</button>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
            </form>

            <div class="login-info">
                <h3>Demo Credentials:</h3>
                <p><strong>Admin:</strong> username: admin | password: admin</p>
                <p><strong>Teacher:</strong> Use your Teacher ID</p>
                <p><strong>Student:</strong> Use your Admission Number</p>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="auth.js"></script>
</body>
</html>
